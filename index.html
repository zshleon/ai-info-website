<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Products Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Controls Bar -->
        <div class="controls-bar">
            <!-- Tabs Area -->
            <div class="tabs">
                <button class="tab" data-tab="overview" id="ui-tab-overview">Overview: Shared vs Dedicated</button>
                <button class="tab active" data-tab="chat" id="ui-tab-chat">Standard Chat</button>
                <button class="tab" data-tab="coding" id="ui-tab-coding">AI Coding Tools</button>
                <button class="tab" data-tab="cli" id="ui-tab-cli">CLI Terminal</button>
            </div>

            <div class="controls-group">
                <select id="sub-filter">
                    <option value="free" id="ui-filter-free">Free Tier</option>
                    <option value="pro" selected id="ui-filter-pro">Pro / Plus Tier</option>
                    <option value="max" id="ui-filter-max">Max / Enterprise Tier</option>
                </select>
                <button id="lang-toggle">English</button>
                <button id="theme-toggle">☀️</button>
            </div>
        </div>

        <!-- Dynamic Cards Grid -->
        <div class="cards-container" id="cards-root"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
